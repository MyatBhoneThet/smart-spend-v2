version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: smartspend-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: myatbhonethet/smart-spend-backend
    container_name: smartspend-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 8000
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/smartspend}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-github}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_GITHUB_CLIENT_ID: ${VITE_GITHUB_CLIENT_ID:-}
    image: myatbhonethet/smart-spend-frontend
    container_name: smartspend-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
